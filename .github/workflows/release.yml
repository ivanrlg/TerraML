name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, win-x64, osx-x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish CLI (${{ matrix.rid }})
        run: |
          dotnet publish src/FuzzySat.CLI/FuzzySat.CLI.csproj \
            -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./artifacts/${{ matrix.rid }}

      - name: Archive
        run: |
          cd artifacts/${{ matrix.rid }}
          tar czf ../../fuzzysat-cli-${{ matrix.rid }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.rid }}
          path: fuzzysat-cli-${{ matrix.rid }}.tar.gz

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fuzzysat-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/fuzzysat-web:latest

  release:
    needs: [build-cli, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cli-*/fuzzysat-cli-*.tar.gz
          generate_release_notes: true
